server:
  port: ${PORT:${SERVER_PORT:8080}}

spring:
  application:
    name: trading-journal-api
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/trading_journal}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
